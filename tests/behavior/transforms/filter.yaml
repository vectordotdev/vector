transforms:
  filter_a:
    inputs:
      - "ignored"
    type: "filter"
    condition:
      type: "vrl"
      source: |
        message = if exists(.tags) { .tags.message } else { .message }
        message == "test filter 1"
  filter_b:
    inputs:
      - "ignored"
    type: "filter"
    condition:
      type: "vrl"
      source: |
        message = if exists(.tags) { string!(.tags.message) } else { string!(.message) }
        contains(message, "test filter") &&
        contains(message, "2")
  filter_c:
    inputs:
      - "ignored"
    type: "filter"
    condition:
      type: "is_metric"

tests:
  - name: "filter test 1a"
    no_outputs_from: []
    inputs:
      - insert_at: "filter_a"
        value: "test filter 1"
    outputs:
      - extract_from: "filter_a"
        conditions:
          - type: "vrl"
            source: '.message == "test filter 1"'

  - name: "filter test 1b"
    no_outputs_from:
      - "filter_b"
    inputs:
      - insert_at: "filter_b"
        value: "test filter 1"

  - name: "filter test 1c"
    no_outputs_from:
      - "filter_c"
    inputs:
      - insert_at: "filter_c"
        value: "test filter 1"

  - name: "filter test 2a"
    no_outputs_from:
      - "filter_a"
    inputs:
      - insert_at: "filter_a"
        value: "test filter 2"

  - name: "filter test 2b"
    no_outputs_from: []
    inputs:
      - insert_at: "filter_b"
        value: "test filter 2"
    outputs:
      - extract_from: "filter_b"
        conditions:
          - type: "vrl"
            source: '.message == "test filter 2"'

  - name: "filter test 2c"
    no_outputs_from:
      - "filter_c"
    inputs:
      - insert_at: "filter_c"
        value: "test filter 2"

  - name: "filter test 3a"
    inputs:
      - insert_at: "filter_a"
        type: "metric"
        metric:
          name: "count"
          kind: "absolute"
          tags:
            message: "test filter 1"
          counter:
            value: 1
    outputs:
      - extract_from: "filter_a"
        conditions:
          - type: "vrl"
            source: '.tags.message == "test filter 1"'
