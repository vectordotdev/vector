transforms:
  reduce:
    inputs: []
    type: "reduce"
    group_by:
      - "request_id"
    ends_when:
      type: "vrl"
      source: "exists(.test_end_message)"

  reduce_strategies:
    inputs: []
    type: "reduce"
    group_by:
      - "request_id"
    merge_strategies:
      message: "concat"
      other_value: "array"
      another: "concat_newline"
      concat_array: "concat"
    ends_when:
      type: "vrl"
      source: "exists(.test_end_message)"

  reduce_numbers:
    inputs: []
    type: "reduce"
    merge_strategies:
      mins: "min"
      maxs: "max"
    ends_when:
      type: "vrl"
      source: "exists(.test_end_message)"

  ends_when_vrl:
    inputs: []
    type: "reduce"
    group_by:
      - "request_id"
    ends_when:
      type: "vrl"
      source: |
        .test_end_message == true

  ruby_exception:
    inputs: []
    type: "reduce"
    merge_strategies:
      message: "concat_newline"
    starts_when:
      type: "vrl"
      source: "match(string!(.message), r'^\\w.*')"

  line_continuation:
    inputs: []
    type: "reduce"
    merge_strategies:
      message: "concat"
    ends_when:
      type: "vrl"
      source: "!ends_with(strip_whitespace(string!(.message)), \"\\\\\")"

  line_termination:
    inputs: []
    type: "reduce"
    merge_strategies:
      message: "concat"
    ends_when:
      type: "vrl"
      source: "ends_with(strip_whitespace(string!(.message)), \";\")"

  log_stream:
    inputs: []
    type: "reduce"
    merge_strategies:
      message: "concat"
    starts_when:
      type: "vrl"
      source: "match(string!(.message), r'^<\\d\\d> ')"

  java_exception:
    inputs: []
    type: "reduce"
    merge_strategies:
      message: "concat_newline"
    starts_when:
      type: "vrl"
      source: "match(string!(.message), r'^\\d{4}-\\d{2}-\\d{2} .+')"

tests:
  - name: "reduce_basic"
    inputs:
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "first message value"
          request_id: "1"
          host: "host1"
          counter: 5
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "second message value"
          request_id: "1"
          host: "host2"
          counter: 7
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "other reduce one"
          request_id: "2"
          host: "host3"
          counter: 11
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "third message value"
          request_id: "1"
          host: "host4"
          counter: 9
          test_end_message: true
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "other reduce two"
          request_id: "2"
          host: "host5"
          counter: 7
      - insert_at: "reduce"
        type: "log"
        log_fields:
          message: "other reduce three"
          request_id: "2"
          host: "host6"
          counter: 2
          test_end_message: true
    outputs:
      - extract_from: "reduce"
        conditions:
          - type: "vrl"
            source: |
              .message == "first message value" &&
              .host == "host1" &&
              .request_id == "1" &&
              .counter == 21 &&
              exists(.timestamp_end)
          - type: "vrl"
            source: |
              .message == "other reduce one" &&
              .host == "host3" &&
              .request_id == "2" &&
              .counter == 20 &&
              exists(.timestamp_end)

  - name: "reduce_merge_strategies"
    inputs:
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "first message value"
          another: "foo"
          request_id: "1"
          other_value: "first"
          host: "host1"
          counter: 5
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "second message value"
          another: "bar baz"
          other_value: 2
          request_id: "1"
          host: "host2"
          counter: 7
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "other reduce one"
          "concat_array[0]": "foo"
          "concat_array[1]": "bar"
          request_id: "2"
          host: "host3"
          counter: 11
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "third message value"
          another: "qux\nquux"
          request_id: "1"
          host: "host4"
          counter: 9
          test_end_message: true
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "other reduce two"
          "concat_array[0]": "baz"
          other_value: "1"
          request_id: "2"
          host: "host5"
          counter: 7
      - insert_at: "reduce_strategies"
        type: "log"
        log_fields:
          message: "other reduce three"
          request_id: "2"
          other_value: true
          host: "host6"
          counter: 2
          test_end_message: true
    outputs:
      - extract_from: "reduce_strategies"
        conditions:
          - type: "vrl"
            source: |
              .message == "first message value second message value third message value" &&
              .another == "foo\nbar baz\nqux\nquux" &&
              .host == "host1" &&
              .request_id == "1" &&
              .counter == 21 &&
              exists(.timestamp_end)
          - type: "vrl"
            source: |
              .message == "other reduce one other reduce two other reduce three" &&
              .concat_array == ["foo", "bar", "baz"] &&
              .host == "host3" &&
              .request_id == "2" &&
              .counter == 20 &&
              exists(.timestamp_end)

  - name: "reduce_number_strategies_1"
    inputs:
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 5.1
          maxs: 3.3
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 9
          maxs: 7.2
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 5.2
          maxs: 6
          test_end_message: "exists"
    outputs:
      - extract_from: "reduce_numbers"
        conditions:
          - type: "vrl"
            source: |
              .mins == 5.1 &&
              .maxs == 7.2 &&
              exists(.timestamp_end)

  - name: "reduce_number_strategies_2"
    inputs:
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 5
          maxs: 3
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 9.1
          maxs: 7
      - insert_at: "reduce_numbers"
        type: "log"
        log_fields:
          mins: 5
          maxs: 6.2
          test_end_message: "exists"
    outputs:
      - extract_from: "reduce_numbers"
        conditions:
          - type: "vrl"
            source: |
              .mins == 5 &&
              .maxs == 7 &&
              exists(.timestamp_end)

  - name: "reduce_ends_when_vrl"
    inputs:
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "1"
          counter: 1
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "1"
          counter: 3
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "2"
          counter: 5
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "1"
          counter: 2
          test_end_message: true
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "1"
          counter: 7
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "2"
          counter: 2
          test_end_message: true
      - insert_at: "ends_when_vrl"
        type: "log"
        log_fields:
          request_id: "3"
          counter: 5
          test_end_message: true
    outputs:
      - extract_from: "ends_when_vrl"
        conditions:
          - type: "vrl"
            source: |
              .request_id == "1" &&
              .counter == 6 &&
              exists(.timestamp_end)
          - type: "vrl"
            source: |
              .request_id == "2" &&
              .counter == 7 &&
              exists(.test_end_message)
          - type: "vrl"
            source: |
              .request_id == "3" &&
              .counter == 5 &&
              exists(.test_end_message)

  - name: "reduce_ruby_exception"
    inputs:
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "Started GET \"/\" for 127.0.0.1 at 2012-03-10 14:28:14 +0100"
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "foobar.rb:6:in `/': divided by 0 (ZeroDivisionError)"
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "  from foobar.rb:6:in `bar'"
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "  from foobar.rb:2:in `foo'"
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "  from foobar.rb:9:in `<main>'"
      - insert_at: "ruby_exception"
        type: "log"
        log_fields:
          message: "Started GET \"/\" for 127.0.0.1 at 2012-03-11 14:28:14 +0100"
    outputs:
      - extract_from: "ruby_exception"
        conditions:
          - type: "vrl"
            source: '.message == "Started GET \"/\" for 127.0.0.1 at 2012-03-10 14:28:14 +0100"'
          - type: "vrl"
            source: |
              .message == "foobar.rb:6:in `/': divided by 0 (ZeroDivisionError)\n  from foobar.rb:6:in `bar'\n  from foobar.rb:2:in `foo'\n  from foobar.rb:9:in `<main>'"

  - name: "reduce_line_continuation"
    inputs:
      - insert_at: "line_continuation"
        type: "log"
        log_fields:
          message: "First-line"
      - insert_at: "line_continuation"
        type: "log"
        log_fields:
          message: "Second line\\"
      - insert_at: "line_continuation"
        type: "log"
        log_fields:
          message: "more second line\\     "
      - insert_at: "line_continuation"
        type: "log"
        log_fields:
          message: "end of second line"
      - insert_at: "line_continuation"
        type: "log"
        log_fields:
          message: "third line"
    outputs:
      - extract_from: "line_continuation"
        conditions:
          - type: "vrl"
            source: '.message == "First-line"'
          - type: "vrl"
            source: '.message == "Second line\\ more second line\\      end of second line"'
          - type: "vrl"
            source: '.message == "third line"'

  - name: "reduce_line_termination"
    inputs:
      - insert_at: "line_termination"
        type: "log"
        log_fields:
          message: "first line;"
      - insert_at: "line_termination"
        type: "log"
        log_fields:
          message: "second line"
      - insert_at: "line_termination"
        type: "log"
        log_fields:
          message: "more of the second line"
      - insert_at: "line_termination"
        type: "log"
        log_fields:
          message: "end of second line;         "
      - insert_at: "line_termination"
        type: "log"
        log_fields:
          message: "third line;"
    outputs:
      - extract_from: "line_termination"
        conditions:
          - type: "vrl"
            source: '.message == "first line;"'
          - type: "vrl"
            source: '.message == "second line more of the second line end of second line;         "'
          - type: "vrl"
            source: '.message == "third line;"'

  - name: "reduce_log_stream"
    inputs:
      - insert_at: "log_stream"
        type: "log"
        log_fields:
          message: "<12> first line "
      - insert_at: "log_stream"
        type: "log"
        log_fields:
          message: " more of the first line"
      - insert_at: "log_stream"
        type: "log"
        log_fields:
          message: "<22> second line"
      - insert_at: "log_stream"
        type: "log"
        log_fields:
          message: "<17> third line"
      - insert_at: "log_stream"
        type: "log"
        log_fields:
          message: "<99> fourth line"
    outputs:
      - extract_from: "log_stream"
        conditions:
          - type: "vrl"
            source: '.message == "<12> first line   more of the first line"'
          - type: "vrl"
            source: '.message == "<22> second line"'
          - type: "vrl"
            source: '.message == "<17> third line"'

  - name: "reduce_java_exception"
    inputs:
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "2020-10-19 04:34:15,389 - org.apache.skywalking.oap.server.starter.OAPServerBootstrap -571727 [main] ERROR [] - method [HEAD], host [http://localhost:9200], URI [/], status line [HTTP/1.1 503 Service Unavailable]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "org.elasticsearch.ElasticsearchStatusException: method [HEAD], host [http://localhost:9200], URI [/], status line [HTTP/1.1 503 Service Unavailable]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "at org.elasticsearch.client.RestHighLevelClient.parseResponseException(RestHighLevelClient.java:625) ~[elasticsearch-rest-high-level-client-6.3.2.jar:6.3.2]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "at org.elasticsearch.client.RestHighLevelClient.performRequest(RestHighLevelClient.java:535) ~[elasticsearch-rest-high-level-client-6.3.2.jar:6.3.2]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "at org.elasticsearch.client.RestHighLevelClient.ping(RestHighLevelClient.java:275) ~[elasticsearch-rest-high-level-client-6.3.2.jar:6.3.2]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "Caused by: org.elasticsearch.client.ResponseException: method [HEAD], host [http://localhost:9200], URI [/], status line [HTTP/1.1 503 Service Unavailable]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "... 7 more"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "Caused by: org.elasticsearch.client.ResponseException: method [HEAD], host [http://localhost:9200], URI [/], status line [HTTP/1.1 503 Service Unavailable]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "at java.lang.Thread.run(Thread.java:748) ~[?:1.8.0_181]"
      - insert_at: "java_exception"
        type: "log"
        log_fields:
          message: "2020-10-19 05:34:15,389 - org.apache.skywalking.oap.server.starter.OAPServerBootstrap -571727 [main] ERROR [] - method [HEAD], host [http://localhost:9200], URI [/], status line [HTTP/1.1 503 Service Unavailable]"
    outputs:
      - extract_from: "java_exception"
        conditions:
          - type: "vrl"
            source: |
              message = string!(.message)
              starts_with(message, "2020-10-19 04:34:15,389") &&
              ends_with(message, "\nat java.lang.Thread.run(Thread.java:748) ~[?:1.8.0_181]")
