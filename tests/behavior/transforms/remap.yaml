    source: "     .grokked = parse_grok!(.message, \"%{TIMESTAMP_ISO8601:timestamp} (%{EMAILADDRESS:email}|%{LOGLEVEL:level}) %{GREEDYDATA:message}\")\n     "
  remap_function_parse_common_log:
