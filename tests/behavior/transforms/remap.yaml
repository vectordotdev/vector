  remap_function_merge:
    inputs: []
    type: remap
    source: "     .foo = parse_json!(.foo)\n     .bar = parse_json!(.bar)\n     .bar = merge!(.bar, .foo, deep: true)\n   "
  remap_function_flatten:
    inputs: []
    type: remap
    source: "     .arr = flatten!(parse_json!(.arr))\n     .map = flatten!(parse_json!(.map))\n     .a = .map.\"field1.field2\"\n     .b = .map.\"field1.field3\"\n   "
  remap_function_redact:
    inputs: []
    type: remap
    source: "     .a = redact!(.input, filters: [r'hello'])\n     .b = redact!(.input, filters: [r'hello', r'wor'])\n     .c = redact!(.input, filters: [r'world|universe'])\n     .d = redact!(.input, filters: [])\n     .e = redact!(.input, filters: [r'hello', r'[uieao]'])\n   "
  remap_function_replace:
    inputs: []
    type: remap
    source: "     .a = replace(\"foo\", pattern: \"o\", with: \"bar\", 1)\n     .b = replace(\"foo\", pattern: r'o', with: \"bar\")\n   "
  remap_function_parse_aws_alb_log:
    inputs: []
    type: remap
    source: "     .parts = parse_aws_alb_log!(.log)\n   "
  remap_function_parse_aws_vpc_flow_log:
    inputs: []
    type: remap
    source: "     .a = parse_aws_vpc_flow_log!(.a)\n     .b = parse_aws_vpc_flow_log!(.b, format: \"instance_id interface_id srcaddr dstaddr pkt_srcaddr pkt_dstaddr\")\n   "
  remap_metrics:
    inputs: []
    type: remap
    source: "     .tags.host = \"ook\"\n     .tags.name = .name\n     .tags.namespace = .namespace\n     .tags.type = .type\n   "
  remap_function_encode_json:
    inputs: []
    type: remap
    source: "     .a = encode_json(parse_json!(.a))\n     .b = encode_json(parse_json!(.b))\n   "
  remap_function_parse_regex:
    inputs: []
    type: remap
    source: "     . = parse_regex!(.message, r'^(?P<host>[\\w\\.]+) - (?P<user>[\\w]+) (?P<bytes_in>[\\d]+) \\[(?P<timestamp>.*)\\] \"(?P<method>[\\w]+) (?P<path>.*)\" (?P<status>[\\d]+) (?P<bytes_out>[\\d]+)$', numeric_groups: true)\n     .bytes_in = to_int!(.bytes_in)\n     .status = to_int!(.status)\n     .bytes_out = to_int!(.bytes_out)\n   "
  remap_function_parse_regex_all:
    inputs: []
    type: remap
    source: "     .result = parse_regex_all!(.message, r'(?P<fruit>[\\w\\.]+) and (?P<veg>[\\w]+)', numeric_groups: true)\n   "
  remap_function_parse_aws_cloudwatch_log_subscription_message:
    inputs: []
    type: remap
    source: "     .result = parse_aws_cloudwatch_log_subscription_message!(.message)\n   "
  remap_function_parse_key_value:
    inputs: []
    type: remap
    source: "     . = parse_key_value!(.message, key_value_delimiter: \"=\", field_delimiter: \" \")\n   "
  remap_function_is_nullish:
    inputs: []
    type: remap
    source: "     .a = is_nullish(.a)\n     .b = is_nullish(.b)\n     .c = is_nullish(.c)\n     .d = is_nullish(.d)\n     .e = is_nullish(.e)\n     .f = is_nullish(.f)\n     .g = is_nullish(.g)\n   "
  remap_function_to_syslog_facility:
    inputs: []
    type: remap
    source: "     .a = to_syslog_facility!(.a)\n     .b = to_syslog_facility!(.b)\n     .c = to_syslog_facility!(.c)\n   "
  remap_function_to_unix_timestamp:
    inputs: []
    type: remap
    source: "     .secs = to_unix_timestamp(parse_timestamp!(.time, \"%+\"))\n     .millis = to_unix_timestamp(parse_timestamp!(.time, \"%+\"), unit: \"milliseconds\")\n     .nanos = to_unix_timestamp(parse_timestamp!(.time, \"%+\"), unit: \"nanoseconds\")\n   "
  remap_function_push_to_array:
    inputs: []
    type: remap
    source: "     .result = push!(parse_json!(.fruits), .fruit)\n   "
  remap_function_append_to_array:
    inputs: []
    type: remap
    source: "     .result = append!(parse_json!(.fruits), parse_json!(.other_fruits))\n   "
  remap_function_encode_base64:
    inputs: []
    type: remap
    source: "     .result = encode_base64!(.message)\n   "
  remap_function_decode_base64:
    inputs: []
    type: remap
    source: "     .result = decode_base64!(.message)\n   "
  remap_comments:
    inputs: []
    type: remap
    source: "     .a = 1 # .a = 2\n     # .a = 3\n\n     .b = .a == 2 ||\n\n     # We should ignore this too.\n     # .a == 3 &&\n\n     .a == 1\n   "
  remap_multiline:
    inputs: []
    type: remap
    source: "     .a = \"A long \" +\n\n          \"multiline \" +\n          \"string\"\n   "
  remap_function_length:
    inputs: []
    type: remap
    source: "     .a = length!(parse_json!(.a))\n     .b = length!(parse_json!(.b))\n     .c = length!(parse_json!(.c))\n   "
  remap_function_get_hostname:
    inputs: []
    type: remap
    source: "     .a = get_hostname!()\n   "
  remap_function_get_timezone_name:
    inputs: []
    type: remap
    source: "     .a = get_timezone_name!()\n   "
  remap_function_join:
    inputs: []
    type: remap
    source: "     items = [\"foo\", \"bar\", \"baz\"]\n     .comma = join!(items, \", \")\n     .space = join!(items, \" \")\n     .none = join!(items)\n     .from_split = join!(split(\"big bad booper\", \" \"), \"__\")\n   "
  remap_function_reverse_dns:
    inputs: []
    type: remap
    source: "    .host = reverse_dns!(.ip)\n  "
  remap_function_get_enrichment_table_row:
    inputs: []
    type: remap
    source: "    . = get_enrichment_table_record!(\"test\", { \"id\": .id })\n  "
  remap_function_find_enrichment_table_rows:
    inputs: []
    type: remap
    source: "    .trees = find_enrichment_table_records!(\"test\", { \"tree\": .tree })\n  "
  remap_metadata:
    inputs: []
    type: remap
    source: "      set_secret(\"datadog_api_key\", \"iamanapikey\")\n      .key = get_secret(\"datadog_api_key\")\n      remove_secret(\"datadog_api_key\")\n      .empty_key = get_secret(\"datadog_api_key\")\n\n      set_secret(\"splunk_hec_token\", \"iamasplunkhectoken\")\n      .splunk_hec_token = get_secret(\"splunk_hec_token\")\n      remove_secret(\"splunk_hec_token\")\n      .empty_splunk_hec_token = get_secret(\"splunk_hec_token\")\n  "
tests:
- name: remap_source
  input:
    insert_at: remap_source
    type: log
    log_fields:
      foo: true
  outputs:
  - extract_from: remap_source
    conditions:
    - type: vrl
      source: .message == "foo"
- name: remap_file
  input:
    insert_at: remap_file
    type: log
    log_fields:
      foo: true
  outputs:
  - extract_from: remap_file
    conditions:
    - type: vrl
      source: .message == "foo"
- name: remap_emit_multiple
  input:
    insert_at: remap_emit_multiple
    type: log
    log_fields:
      foo: true
  outputs:
  - extract_from: remap_emit_multiple
    conditions:
    - type: vrl
      source: .message == "hello"
- name: remap_mapped_scalars
  input:
    insert_at: remap_mapped_scalars
    type: log
    log_fields:
      foo: true
  outputs:
  - extract_from: remap_mapped_scalars
    conditions:
    - type: vrl
      source: .message == 5
- name: remap_abort
  input:
    insert_at: remap_abort
    type: log
    log_fields:
      foo: true
      bar: true
  outputs:
  - extract_from: remap_abort
    conditions:
    - type: vrl
      source: .foo == true && .bar == true
- name: remap_abort_drop_on_abort
  no_outputs_from:
  - remap_abort_drop_on_abort
  input:
    insert_at: remap_abort_drop_on_abort
    type: log
    log_fields:
      foo: true
      bar: true
- name: remap_nested
  input:
    insert_at: remap_nested
    type: raw
    value: ''
  outputs:
  - extract_from: remap_nested
