transforms:
  remap_source:
    inputs: []
    type: remap
    source: "    .message = \"foo\"\n  "
  remap_file:
    inputs: []
    type: remap
    file: tests/data/remap/program.vrl
  remap_emit_multiple:
    inputs: []
    type: remap
    source: "    . = [{\"message\": \"hello\"}, {\"message\": \"world\"}]\n  "
  remap_mapped_scalars:
    inputs: []
    type: remap
    source: "    . = 5\n  "
  remap_abort:
    inputs: []
    type: remap
    drop_on_abort: false
    source: "    .foo = false\n    abort\n    .bar = false\n  "
  remap_abort_drop_on_abort:
    inputs: []
    type: remap
    drop_on_abort: true
    source: "    .foo = false\n    abort\n    .bar = false\n  "
  remap_nested:
    inputs: []
    type: remap
    source: "    .a.b = 123\n    .x.y = 456\n    .x.z = 789\n  "
  remap_array:
    inputs: []
    type: remap
    source: "    .a[0] = 0\n    .a[1] = \"1\"\n    .a[2] = 2.0\n    .b[2] = \"two\"\n    .b[0] = 0\n  "
  remap_arithmetic:
    inputs: []
    type: remap
    source: "    .result_a, err = .a * .b + .c - .d\n    .result_b, err = .a * (.b + .c) - .d\n    .result_c, err = .a + .b * .c / .d\n    .result_d, err = (.a + .b) * (.c / .d)\n    .result_e, err = .e / .c\n  "
  remap_arithmetic_error:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    a = 10\n    b = 0\n    .a, err = a / b\n  "
  remap_boolean_arithmetic:
    inputs: []
    type: remap
    source: "    .result_a, err = .a + .b > 9\n    .result_b, err = .a * .b < 20\n    .result_c, err = 1 >= .a / .b\n    .result_d, err = .a + .b > .c + .d\n  "
  remap_coercion:
    inputs: []
    type: remap
    source: "    .foo = to_string!(.foo)\n    .bar = to_int!(.bar)\n    .baz = to_float!(.baz)\n    .bev = to_bool!(.bev)\n    .a = to_string(parse_timestamp!(.a, \"%+\"))\n  "
  remap_quoted_path:
    inputs: []
    type: remap
    source: "    .a.\"b.c\" = .\"d.e\"\n  "
  remap_infallible_assignment:
    inputs: []
    type: remap
    source: "    .nope, .err1 = parse_json(\"{ INVALID }\")\n    .ok, .err2 = parse_json(\"{ \\\"foo\\\": true }\")\n  "
  remap_error_coalesce_operator:
    inputs: []
    type: remap
    source: "    .val1 = parse_json(\"{ INVALID }\") ?? \"nope\"\n    .val2 = parse_json(\"true\") ?? \"nope\"\n  "
  remap_bang_function:
    inputs: []
    type: remap
    source: "    .val = parse_json!(\"{ INVALID }\")\n  "
  remap_function_arguments:
    inputs: []
    type: remap
    source: "    .a = to_string!(.in)\n    .b = to_string!(value: .in)\n    .c = to_string!(.nope)\n    .d = to_string!(value: .nope)\n    .e = to_string!(.other)\n    .f = to_string!(value: .other)\n  "
  remap_function_upcase:
    inputs: []
    type: remap
    source: "    .a = upcase(string!(.a))\n    .b = upcase(string!(.b))\n    .c.c = upcase(string!(.c.c))\n\n    if upcase(string!(.f)) == \"F\" {\n      .f = \"ff\"\n    }\n  "
  remap_function_upcase_error:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    .a = upcase(string!(.a))\n    .b = upcase(string!(.b))\n  "
  remap_function_downcase:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    .a = downcase(string!(.a))\n    .b = downcase(string!(.b))\n    .c.c = downcase(string!(.c.c))\n\n    if downcase(string!(.f)) == \"f\" {\n      .f = \"FF\"\n    }\n  "
  remap_function_downcase_error:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    .a = downcase(string!(.a))\n    .b = downcase(string!(.b))\n  "
  remap_function_uuid_v4:
    inputs: []
    type: remap
    source: "    .a = uuid_v4()\n\n    if uuid_v4() != \"\" {\n      .b = \"bar\"\n    }\n  "
  remap_function_uuid_v7:
    inputs: []
    type: remap
    source: "    .a = uuid_v7()\n\n    if uuid_v7() != \"\" {\n      .b = \"bar\"\n    }\n  "
  remap_function_sha1:
    inputs: []
    type: remap
    source: "    .a = sha1(string!(.a))\n\n    if sha1(string!(.b)) == \"62cdb7020ff920e5aa642c3d4066950dd1f01f4d\" {\n      .b = sha1(.a + string!(.b) + \"baz\")\n    }\n  "
  remap_function_sha1_error:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    .a = sha1(string!(.a))\n    .b = sha1(string!(.b))\n  "
  remap_function_md5:
    inputs: []
    type: remap
    source: "    .a = md5(string!(.a))\n\n    if md5(string!(.b)) == \"37b51d194a7513e45b56f6524f2d51f2\" {\n      .b = md5(.a + string!(.b) + \"baz\")\n    }\n  "
  remap_function_md5_error:
    inputs: []
    type: remap
    drop_on_error: true
    source: "    .a = md5(string!(.a))\n    .b = md5(string!(.b))\n  "
  remap_function_now:
    inputs: []
    type: remap
    source: "    .a = now()\n  "
  remap_function_format_timestamp:
    inputs: []
    type: remap
    source: "    .a = format_timestamp!(from_unix_timestamp!(.foo), format: \"%+\")\n  "
  remap_function_contains:
    inputs: []
    type: remap
    source: "    .a = contains(string!(.foo), substring: string!(.bar))\n    .b = contains(string!(.bar), substring: \"bar\")\n    .c = contains(string!(.bar), substring: \"BAR\", case_sensitive: true)\n    .d = contains(string!(.bar), substring: \"BAR\", case_sensitive: false)\n    .e = contains(string!(.foobar), substring: \"oba\")\n    .f = contains(string!(.foobar), substring: \"OBA\", case_sensitive: true)\n    .g = contains(string!(.foobar), substring: \"OBA\", case_sensitive: false)\n  "
  remap_function_starts_with:
    inputs: []
    type: remap
    source: "    .a = starts_with(string!(.foobar), substring: string!(.foo))\n    .b = starts_with(string!(.foobar), substring: \"foo\")\n    .c = starts_with(string!(.foobar), substring: \"bar\")\n    .d = starts_with(string!(.foobar), substring: \"FOO\", case_sensitive: true)\n    .e = starts_with(string!(.foobar), substring: \"FOO\", case_sensitive: false)\n  "
  remap_function_ends_with:
    inputs: []
    type: remap
    source: "     .a = ends_with!(.foobar, substring: .bar)\n     .b = ends_with!(.foobar, substring: \"bar\")\n     .c = ends_with!(.foobar, substring: \"foo\")\n     .d = ends_with!(.foobar, substring: \"BAR\", case_sensitive: true)\n     .e = ends_with!(.foobar, substring: \"BAR\", case_sensitive: false)\n   "
  remap_function_slice:
    inputs: []
    type: remap
    source: "     .a = slice!(string!(.foo) + string!(.bar), 1)\n     .b = slice!(string!(.foo) + string!(.bar), 0, 1)\n     .c = slice!(string!(.foo) + string!(.bar), start: -2)\n     .d = slice!(string!(.foo) + string!(.bar), start: 1, end: -1)\n   "
  remap_function_parse_tokens:
    inputs: []
    type: remap
    source: "     .a = parse_tokens!(.a)\n     .b = parse_tokens!(.b)\n   "
  remap_function_sha2:
    inputs: []
    type: remap
    source: "     .a = sha2!(.a)\n\n     if sha2!(.b) == \"725eb523fe006a6ee0071380bd3b4c57590abd44b88614cd3eddf594e3afe1ac\" {\n       .b = sha2(.a + string!(.b) + \"baz\")\n     }\n   "
  remap_function_sha3:
    inputs: []
    type: remap
    source: "     .a = sha3!(.a)\n\n     if sha3!(.b) == \"03457d23880d7847fc3f58780dd58cda7237a7144ac6758e76d45cec0e06ba69440a855e913ef03790c618777f5b0ec25fc34c4b82d7538151745b120b4f8b37\" {\n       .b = sha3(.a + string!(.b) + \"baz\")\n     }\n   "
  remap_function_parse_duration:
    inputs: []
    type: remap
    source: "     .a = parse_duration!(.a, \"ms\")\n     .b = parse_duration!(\"100ms\", unit: \"s\")\n   "
  remap_function_parse_glog:
    inputs: []
    type: remap
    source: "     .glog = parse_glog!(.message)\n     "
  remap_function_format_number:
    inputs: []
    type: remap
    source: "     .a = format_number!(.a, scale: 2, decimal_separator: \",\", grouping_separator: \".\")\n   "
  remap_function_parse_url:
    inputs: []
    type: remap
    source: "     .parts = parse_url!(.url)\n   "
  remap_function_ceil:
    inputs: []
    type: remap
    source: "     .a = ceil!(.num)\n     .b = ceil!(.num, precision: 1)\n     .c = ceil!(.num, precision: 2)\n   "
  remap_function_floor:
    inputs: []
    type: remap
    source: "     .a = floor!(.num)\n     .b = floor!(.num, precision: 1)\n     .c = floor!(.num, precision: 2)\n   "
  remap_function_round:
    inputs: []
    type: remap
    source: "     .a = round!(.num)\n     .b = round!(.num, precision: 1)\n     .c = round!(.num, precision: 2)\n   "
  remap_function_parse_syslog:
    inputs: []
    type: remap
    source: "      .a = parse_syslog!(.a)\n    "
  remap_function_split_regex:
    inputs: []
    type: remap
    source: "     .foo = split!(.foo, r'(?i)a.b', 3)\n   "
  remap_function_split_string:
    inputs: []
