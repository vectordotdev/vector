    source: "     .a = ipv6_to_ipv4!(\"::ffff:192.168.10.2\")\n   "
  remap_function_exists:
    inputs: []
    type: remap
    source: "     .data = parse_json!(.data)\n     .a = exists(.foo)\n     .b = exists(.bar)\n     .c = exists(.data.child)\n     .d = exists(.data.nochild)\n     .e = exists(.data.arr[2])\n     .f = exists(.data.arr[3])\n   "
  remap_function_compact:
    inputs: []
    type: remap
    source: "     .compactarr = compact!(parse_json!(.arr))\n     .compactmap = compact!(parse_json!(.map))\n     .a = exists(.compactmap.field1)\n     .b = exists(.compactmap.field2)\n     .c = exists(.compactmap.field3)\n     .d = exists(.compactmap.field4.nested1)\n     .e = exists(.compactmap.field4.nested2)\n   "
  remap_function_assert_pass:
    inputs: []
    type: remap
    drop_on_error: true
    source: "     assert!(.foo, message: \"assert failed\")\n     .check = \"checked\"\n   "
  remap_function_assert_fail:
    inputs: []
    type: remap
    drop_on_error: true
    source: "     assert!(.foo, message: \"assert failed\")\n   "
  remap_function_log:
