    source: "     .common_log = parse_common_log!(.message)\n     .common_log_timestamp_format = parse_common_log!(.message, \"%d/%b/%Y:%T %z\")\n     "
  remap_function_ip_subnet:
    inputs: []
    type: remap
    source: "     .a = ip_subnet!(\"192.168.10.23\", \"255.255.0.0\")\n     .b = ip_subnet!(\"192.168.10.23\", \"/8\")\n     .c = ip_subnet!(\"2404:6800:4003:c02::64\", \"ffff:ffff::\")\n     .d = ip_subnet!(\"2404:6800:4003:c02::64\", \"/16\")\n   "
  remap_function_ip_cidr_contains:
    inputs: []
    type: remap
    source: "     .a = ip_cidr_contains!(cidr: \"192.168.0.0/16\", value: \"192.168.10.2\")\n     .b = ip_cidr_contains!(cidr: \"192.168.0.0/16\", value: \"192.169.10.2\")\n     .c = ip_cidr_contains!(cidr: \"2404:6800:4003:c02::/64\", value: \"2404:6800:4003:c02::aaaa\")\n     .d = ip_cidr_contains!(\"2404:6800:4003:c02::/64\", \"2404:6800:4004:c02::aaaa\")\n   "
  remap_function_ip_to_ipv6:
    inputs: []
    type: remap
    source: "     .a = ip_to_ipv6!(\"192.168.10.2\")\n   "
  remap_function_ipv6_to_ipv4:
