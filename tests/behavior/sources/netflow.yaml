- name: netflow_v5_basic
  expectation: success
  events:
    - log_builder:
        flow_type: "netflow_v5"
        srcaddr: "192.168.1.1"
        dstaddr: "10.0.0.1"
        srcport: 80
        dstport: 443
        prot: 6
        doctets: 1500
        dpkts: 10
        version: 5

- name: unknown_protocol_short_packet
  expectation: partial_success
  events:
    - log_builder:
        flow_type: "unknown"
        peer_addr: "127.0.0.1:12345"
        packet_length: 4
