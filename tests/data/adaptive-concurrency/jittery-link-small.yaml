params:
  requests: 1000
  delay: 0.100
  jitter: 0.1

# Jitter can cause concurrency management to vary widely, though it
# will typically reach high values of requests in flight.

stats:
  in_flight:
    max: [20, 40]
    mean: [8.0, 20.0]
  rate:
    max: [165, 350]
    mean: [70, 150]

controller:
  in_flight:
    max: [20, 40]
    mean: [8.0, 20.0]
  concurrency_limit:
    max: [20, 40]
    mean: [9.0, 20.0]
  observed_rtt:
    mean: [0.100, 0.130]
  averaged_rtt:
    mean: [0.100, 0.130]
