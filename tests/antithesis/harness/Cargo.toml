[package]
name = "antithesis-harness"
version = "0.1.0"
edition = "2021"
publish = false

# The workload binaries shared by every scenario: the oracle, the produce driver,
# and the eventually-phase conservation/liveness judge. They are buffer-agnostic,
# so each scenario builds them with `-p antithesis-harness` and points them at its own
# topology through environment variables.
[dependencies]
antithesis_sdk = { workspace = true, features = ["full"] }
axum = { workspace = true, features = ["http1", "tokio"] }
clap = { workspace = true, features = ["derive"] }
reqwest = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "net", "time"] }
# `WRITE_BUFFER_SIZE_V2` is exported only under this feature, so payload sizing
# tracks the real disk_v2 write-buffer constant instead of a hardcoded copy.
vector-buffers = { workspace = true, features = ["test"] }

# antithesis-instrumentation links a native .a via ELF .init_array -- Linux only.
[target.'cfg(target_os = "linux")'.dependencies]
antithesis-instrumentation = { workspace = true }
