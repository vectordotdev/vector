data_dir: /var/lib/vector

sources:
  in:
    type: vector
    address: 0.0.0.0:6000
    acknowledgements:
      enabled: true

  metrics:
    type: internal_metrics
    scrape_interval_secs: 1

sinks:
  out:
    type: http
    inputs: [in]
    uri: http://oracle:8686/ingest
    method: post
    encoding:
      codec: json
    buffer:
      type: disk
      max_size: 8388608 # 8MiB (4 data files), small enough that a stalled reader fills it and blocks
      when_full: block
    acknowledgements:
      enabled: true

  prom:
    type: prometheus_exporter
    inputs: [metrics]
    address: 0.0.0.0:9598
