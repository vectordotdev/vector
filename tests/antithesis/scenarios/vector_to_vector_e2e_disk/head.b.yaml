data_dir: /var/lib/vector

sources:
  in:
    type: http_server
    address: 0.0.0.0:8080
    decoding:
      codec: json
    acknowledgements:
      enabled: true

  metrics:
    type: internal_metrics
    scrape_interval_secs: 1

sinks:
  out:
    type: vector
    inputs: [in]
    address: "tail:6000"
    compression: none
    request:
      timeout_secs: 45
    buffer:
      type: disk
      max_size: 268435488 # ~256MB, the enforced minimum
      when_full: block
    acknowledgements:
      enabled: true

  prom:
    type: prometheus_exporter
    inputs: [metrics]
    address: 0.0.0.0:9598
