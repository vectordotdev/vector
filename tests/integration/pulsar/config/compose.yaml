version: "3"

services:
  pulsar:
    image: docker.io/apachepulsar/pulsar:${CONFIG_VERSION}
    command: sh -c "bin/apply-config-from-env.py conf/standalone.conf && bin/pulsar standalone"
    ports:
      - 6650:6650
      - 6651:6651
    environment:
      # Since apache/pulsar#25238, standalone mode advertises the container's FQDN
      # (the container ID) instead of localhost. Set explicitly so TLS hostname
      # verification matches the certificate's DNS SAN.
      - PULSAR_PREFIX_advertisedAddress=pulsar
      - PULSAR_PREFIX_brokerServicePortTls=6651
      - PULSAR_PREFIX_tlsKeyFilePath=/etc/pulsar/certs/pulsar.key.pem
      - PULSAR_PREFIX_tlsCertificateFilePath=/etc/pulsar/certs/pulsar.cert.pem
      - PULSAR_PREFIX_tlsTrustCertsFilePath=/etc/pulsar/certs/ca-chain.cert.pem
    volumes:
      - ../../../data/ca/intermediate_server/private/pulsar.key.pem:/etc/pulsar/certs/pulsar.key.pem:ro
      - ../../../data/ca/intermediate_server/certs/pulsar.cert.pem:/etc/pulsar/certs/pulsar.cert.pem:ro
      - ../../../data/ca/intermediate_server/certs/ca-chain.cert.pem:/etc/pulsar/certs/ca-chain.cert.pem:ro

networks:
  default:
    name: ${VECTOR_NETWORK}
    external: true
