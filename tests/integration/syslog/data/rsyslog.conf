module(load="imudp")
module(load="imtcp")

template(name="RawSyslogMessage" type="string" string="%rawmsg%\n")

input(type="imudp" port="5514" ruleset="udp")
input(type="imtcp" port="5515" ruleset="tcp_line" supportOctetCountedFraming="off")
input(type="imtcp" port="5516" ruleset="tcp_octet" supportOctetCountedFraming="on")

ruleset(name="udp") {
    action(type="omfile" file="/var/log/vector-test/udp.log" template="RawSyslogMessage")
}

ruleset(name="tcp_line") {
    action(type="omfile" file="/var/log/vector-test/tcp-line.log" template="RawSyslogMessage")
}

ruleset(name="tcp_octet") {
    action(type="omfile" file="/var/log/vector-test/tcp-octet.log" template="RawSyslogMessage")
}
