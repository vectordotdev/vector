@version: current

options {
    chain_hostnames(off);
    use_dns(no);
    keep_hostname(yes);
    create_dirs(yes);
};

template raw {
    template("$RAWMSG\n");
    template_escape(no);
};

source s_udp {
    network(
        ip("0.0.0.0")
        port(5514)
        transport("udp")
        flags(syslog-protocol, store-raw-message)
    );
};

source s_tcp_line {
    network(
        ip("0.0.0.0")
        port(5515)
        transport("tcp")
        flags(syslog-protocol, store-raw-message)
    );
};

source s_tcp_octet {
    network(
        ip("0.0.0.0")
        port(5516)
        transport("tcp")
        flags(syslog-protocol, store-raw-message)
        encoding("utf-8")
    );
};

source s_tcp_tls {
    network(
        ip("0.0.0.0")
        port(5517)
        transport("tls")
        flags(syslog-protocol, store-raw-message)
        tls(
            key-file("/etc/syslog-ng/tls/localhost.key.pem")
            cert-file("/etc/syslog-ng/tls/localhost.cert.pem")
            peer-verify("optional-untrusted")
        )
    );
};

destination d_udp {
    file("/var/log/vector-test/syslog-ng-udp.log" template(raw));
};

destination d_tcp_line {
    file("/var/log/vector-test/syslog-ng-tcp-line.log" template(raw));
};

destination d_tcp_octet {
    file("/var/log/vector-test/syslog-ng-tcp-octet.log" template(raw));
};

destination d_tcp_tls {
    file("/var/log/vector-test/syslog-ng-tcp-tls.log" template(raw));
};

log { source(s_udp); destination(d_udp); };
log { source(s_tcp_line); destination(d_tcp_line); };
log { source(s_tcp_octet); destination(d_tcp_octet); };
log { source(s_tcp_tls); destination(d_tcp_tls); };
