version: '3'

services:
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    command:
    - --project=testproject
    - --data-from-yaml=/data.yaml
    volumes:
    - ./bigquery-emulator-schema.yaml:/data.yaml:ro

  gcloud-pubsub:
    image: docker.io/messagebird/gcloud-pubsub-emulator:${CONFIG_VERSION}
    environment:
    - PUBSUB_PROJECT1=testproject,topic1:subscription1
    - PUBSUB_PROJECT2=sourceproject,topic2:subscription2
  chronicle-emulator:
    image: docker.io/timberio/chronicle-emulator:${CONFIG_VERSION}
    ports:
    - 3000:3000
    volumes:
    - ./public.pem:/public.pem:ro
    command:
    - -p
    - /public.pem

networks:
  default:
    name: ${VECTOR_NETWORK}
    external: true
