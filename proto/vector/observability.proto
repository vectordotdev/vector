syntax = "proto3";
package vector.observability;

import "google/protobuf/timestamp.proto";
import "event.proto";

// Observability service for monitoring Vector instances.
service Observability {
  // ========== Simple Queries ==========

  // Check if the API server is healthy and responding
  rpc Health(HealthRequest) returns (HealthResponse);

  // Get metadata about the Vector instance (version, hostname)
  rpc GetMeta(MetaRequest) returns (MetaResponse);

  // Get information about configured components (sources, transforms, sinks)
  rpc GetComponents(ComponentsRequest) returns (ComponentsResponse);

  // ========== Real-time Metric Streams ==========
  // All streaming RPCs send periodic updates at the specified interval

  // Stream periodic heartbeat timestamps
  rpc StreamHeartbeat(HeartbeatRequest) returns (stream HeartbeatResponse);

  // Stream uptime in seconds
  rpc StreamUptime(UptimeRequest) returns (stream UptimeResponse);

  // Stream memory allocated per component
  rpc StreamComponentAllocatedBytes(MetricStreamRequest) returns (stream ComponentAllocatedBytesResponse);

  // Stream per-component metrics (throughput or totals) for a chosen metric.
  // Replaces the former 9 per-metric streaming RPCs with a single unified endpoint.
  rpc StreamComponentMetrics(ComponentMetricStreamRequest) returns (stream ComponentMetricResponse);

  // ========== Event Tapping ==========

  // Stream events from components matching the specified patterns (replaces vector tap)
  rpc StreamOutputEvents(OutputEventsRequest) returns (stream OutputEvent);
}

// ========== Health & Meta Messages ==========

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
}

message MetaRequest {}

message MetaResponse {
  string version = 1;
  string hostname = 2;
}

// ========== Component Messages ==========

message ComponentsRequest {
  // Maximum number of components to return (0 = no limit)
  int32 limit = 1;
}

message ComponentsResponse {
  repeated Component components = 1;
}

message Component {
  string component_id = 1;
  ComponentType component_type = 2;
  string on_type = 3; // The specific component type name (e.g., "file", "http")
  repeated Output outputs = 4;
  ComponentMetrics metrics = 5;
}

enum ComponentType {
  SOURCE = 0;
  TRANSFORM = 1;
  SINK = 2;
}

message Output {
  string output_id = 1;
  int64 sent_events_total = 2;
}

message ComponentMetrics {
  optional int64 received_bytes_total = 1;
  optional int64 received_events_total = 2;
  optional int64 sent_bytes_total = 3;
  optional int64 sent_events_total = 4;
}

// ========== Streaming Metrics Messages ==========

message MetricStreamRequest {
  // Update interval in milliseconds
  int32 interval_ms = 1;
}

// Identifies which per-component metric to stream via StreamComponentMetrics.
enum MetricName {
  METRIC_NAME_UNSPECIFIED = 0;
  RECEIVED_EVENTS_THROUGHPUT = 1;
  SENT_EVENTS_THROUGHPUT = 2;
  RECEIVED_BYTES_THROUGHPUT = 3;
  SENT_BYTES_THROUGHPUT = 4;
  RECEIVED_EVENTS_TOTAL = 5;
  SENT_EVENTS_TOTAL = 6;
  RECEIVED_BYTES_TOTAL = 7;
  SENT_BYTES_TOTAL = 8;
  ERRORS_TOTAL = 9;
}

message ComponentMetricStreamRequest {
  // Update interval in milliseconds
  int32 interval_ms = 1;
  MetricName metric = 2;
}

// Cumulative total value for a component metric.
// output_totals is only populated for SENT_EVENTS_TOTAL.
message TotalMetric {
  int64 value = 1;
  map<string, int64> output_totals = 2;
}

// Throughput value (per-second rate) for a component metric.
// output_throughputs is only populated for SENT_EVENTS_THROUGHPUT.
message ThroughputMetric {
  double value = 1;
  map<string, double> output_throughputs = 2;
}

message ComponentMetricResponse {
  string component_id = 1;
  oneof value {
    TotalMetric total = 2;
    ThroughputMetric throughput = 3;
  }
}

message HeartbeatRequest {
  // Update interval in milliseconds
  int32 interval_ms = 1;
}

message HeartbeatResponse {
  google.protobuf.Timestamp utc = 1;
}

message UptimeRequest {
  // Update interval in milliseconds
  int32 interval_ms = 1;
}

message UptimeResponse {
  int64 uptime_seconds = 1;
}

message ComponentAllocatedBytesResponse {
  string component_id = 1;
  int64 allocated_bytes = 2;
}

// ========== Event Tapping Messages ==========

message OutputEventsRequest {
  // Glob patterns for output component IDs to match
  repeated string outputs_patterns = 1;

  // Glob patterns for input component IDs to match (optional)
  repeated string inputs_patterns = 2;

  // Maximum number of events to sample per interval. Must be >= 1.
  // Unlike GetComponents, 0 is not valid here: limit controls both the
  // reservoir size and the internal channel capacity, which require a
  // positive value.
  int32 limit = 3;

  // Sampling interval in milliseconds
  int32 interval_ms = 4;
}

message OutputEvent {
  oneof event {
    TappedEvent tapped_event = 1;
    EventNotification notification = 2;
  }
}

// Event captured from a component with metadata about where it came from
message TappedEvent {
  string component_id = 1;
  string component_type = 2;
  string component_kind = 3;
  event.EventWrapper event = 4;  // The actual event data (uses canonical proto definition)
}

message EventNotification {
  string message = 1;
}
