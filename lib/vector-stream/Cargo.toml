[package]
name = "vector-stream"
version = "0.1.0"
authors = ["Vector Contributors <vector@datadoghq.com>"]
edition = "2024"
publish = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tokio_unstable)'] }

[features]
tokio-taskdump = []

[dependencies]
async-backtrace.workspace = true
async-stream.workspace = true
futures.workspace = true
futures-util.workspace = true
pin-project.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-util = { version = "0.7.0", default-features = false, features = [
    "time",
] }
tower = { version = "0.5.2", default-features = false, features = ["util"] }
tracing.workspace = true
twox-hash = { version = "2.1.2", default-features = false, features = [
    "xxhash64",
] }
vector-common = { path = "../vector-common" }
vector-core = { path = "../vector-core" }

[target.'cfg(target_os = "linux")'.dependencies]
tokio = { workspace = true, features = ["taskdump"] }

[dev-dependencies]
proptest = "1.8"
rand.workspace = true
rand_distr.workspace = true
tokio = { workspace = true, features = ["test-util"] }
