[package]
name = "vector-vrl-doc-builder"
version = "0.1.0"
authors = ["Vector Contributors <vector@datadoghq.com>"]
edition = "2024"
publish = false
license = "MPL-2.0"

[dependencies]
anyhow.workspace = true
clap.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
vector-vrl-functions = { path = "../functions", features = ["dnstap", "vrl-metrics"] }
vrl = { workspace = true, features = ["docs"] }
