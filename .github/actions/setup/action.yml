name: "CI Toolchain Setup"
description: "Prepare a fast and minimal CI environment. Set any input to true to install or configure any tool"

branding:
  icon: package
  color: purple

inputs:
  cargo-cache:
    required: false
    default: true
    description: "Cache Cargo registry, index, and git DB. Enabled automatically if any Rust tools are requested."

  mold:
    required: false
    default: true
    description: "Install mold linker and configure a rustc wrapper to speed up linking. Avoid enabling with cross."

  protoc:
    required: false
    default: false
    description: "Install protoc (uses scripts/environment/install-protoc.sh)."
  cue:
    required: false
    default: false
    description: "Install cue."
  libsasl2:
    required: false
    default: false
    description: "Install libsasl2." # Required to fully build Vector

  # prepare.sh - rust
  rust: # rustup module
    required: false
    default: false
    description: "Install/ensure Rust toolchain via rustup (prepare.sh rustup module)."
  cargo-deb:
    required: false
    default: false
    description: "Install cargo-deb."
  cross:
    required: false
    default: false
    description: "Install cross for cross-compiling Rust."
  cargo-nextest:
    required: false
    default: false
    description: "Install cargo-nextest test runner."
  cargo-deny:
    required: false
    default: false
    description: "Install cargo-deny for advisory and license checks."
  cargo-msrv:
    required: false
    default: false
    description: "Install cargo-msrv for minimum supported Rust version checks."
  cargo-hack:
    required: false
    default: false
    description: "Install cargo-hack for feature compilation checks."
  cargo-llvm-cov:
    required: false
    default: false
    description: "Install cargo-llvm-cov for code coverage."
  dd-rust-license-tool:
    required: false
    default: false
    description: "Install Datadog rust-license-tool."
  wasm-pack:
    required: false
    default: false
    description: "Install wasm-pack for Rust to WASM bridge."
  vdev:
    required: false
    default: true
    description: "Install vdev CLI tool via cargo binstall (uses VDEV_VERSION pinned in prepare.sh)."

  # prepare.sh - npm
  markdownlint-cli2:
    required: false
    default: false
    description: "Install markdownlint-cli2 (npm)."
  prettier:
    required: false
    default: false
    description: "Install prettier (npm)."
  datadog-ci:
    required: false
    default: false
    description: "Install @datadog/datadog-ci (npm)."

runs:
  using: "composite"
  steps:
    - id: needs
      name: Compute if rust is needed
      shell: bash
      run: |
        rust="false"

        # If any rust-related inputs are true, enable rust.
        # vdev itself does not compile, but cargo binstall is a cargo subcommand
        # and needs the rust toolchain on PATH to install it.
        for val in "${{ inputs.mold }}" \
                   "${{ inputs.rust }}" \
                   "${{ inputs.cargo-deb }}" \
                   "${{ inputs.cross }}" \
                   "${{ inputs.cargo-nextest }}" \
                   "${{ inputs.cargo-deny }}" \
                   "${{ inputs.cargo-msrv }}" \
                   "${{ inputs.cargo-hack }}" \
                   "${{ inputs.cargo-llvm-cov }}" \
                   "${{ inputs.dd-rust-license-tool }}" \
                   "${{ inputs.wasm-pack }}" \
                   "${{ inputs.vdev }}"; do
          if [[ "$val" == "true" ]]; then
            rust="true"
            break
          fi
        done

        echo "NEEDS_RUST=$rust" >> "$GITHUB_ENV"

        if [[ "$rust" == "true" ]]; then
          echo "RUST_BACKTRACE=full" >> "$GITHUB_ENV"
          # Set nice CI colors
          echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
          # Incremental compilation has no benefit because in our CI we always start from a clean state.
          echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
        fi

    - name: Enable rust matcher
      if: ${{ env.NEEDS_RUST == 'true' }}
      run: echo "::add-matcher::.github/matchers/rust.json"
      shell: bash

    # Caches ~/.cargo (registry + git + cargo-installed bin) AND target/ build
    # artifacts. Master pushes save the cache; PRs read it but don't write
    # back, so a single fixed key per OS keeps the 10 GB GHA cache budget
    # under control even as Cargo.lock churns. PRs only recompile what their
    # changes invalidate (Cargo fingerprints), so unchanged deps
    # (rdkafka-sys, openssl-sys, …) are reused as-is from master's cache.
    #
    # `key:` is fixed (no lockfile hash) on purpose: Swatinem's default key
    # would create a new ~2-3 GB entry per Cargo.lock variant, which blows
    # past the 10 GB GHA cap fast. Cargo's fingerprint system handles
    # invalidation inside the cache. Bump the `-v?` suffix to force a
    # full rebuild if a cache ever gets into a bad state.
    - name: Cache Cargo + target/
      if: ${{ inputs.cargo-cache == 'true' || env.NEEDS_RUST == 'true' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: "vector-${{ runner.os }}-v1"
        # TEMP: save on all refs while prototyping so this branch seeds the
        # cache. Restore to `${{ github.ref == 'refs/heads/master' }}` before
        # merging.
        save-if: true

    - name: Install mold
      if: ${{ runner.os == 'Linux' && env.DISABLE_MOLD != 'true' && inputs.mold == 'true' }}
      shell: bash
      run: |
        echo "Installing mold"

        CARGO_OVERRIDE_DIR="${HOME}/.cargo"
        CARGO_OVERRIDE_CONF="${CARGO_OVERRIDE_DIR}/config.toml"

        # Install mold, because the system linker wastes a bunch of time.
        #
        # Notably, we don't install/configure it when we're going to do anything with `cross`, as `cross` takes the Cargo
        # configuration from the host system and ships it over...  which isn't good when we're overriding the `rustc-wrapper`
        # and all of that.

        # We explicitly put `mold-wrapper.so` right beside `mold` itself because it's hard-coded to look in the same directory
        # first when trying to load the shared object, so we can dodge having to care about the "right" lib folder to put it in.
        TEMP=$(mktemp -d)
        MOLD_VERSION=2.40.4
        MOLD_TARGET=mold-${MOLD_VERSION}-$(uname -m)-linux
        curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/${MOLD_TARGET}.tar.gz" \
        --output "$TEMP/${MOLD_TARGET}.tar.gz"
        tar \
            -xvf "${TEMP}/${MOLD_TARGET}.tar.gz" \
            -C "${TEMP}"
        sudo cp "${TEMP}/${MOLD_TARGET}/bin/mold" /usr/bin/mold
        sudo cp "${TEMP}/${MOLD_TARGET}/lib/mold/mold-wrapper.so" /usr/bin/mold-wrapper.so
        rm -rf "$TEMP"

        # Create our rustc wrapper script that we'll use to actually invoke `rustc` such that `mold` will wrap it and intercept
        # anything linking calls to use `mold` instead of `ld`, etc.
        CARGO_BIN_DIR="${CARGO_OVERRIDE_DIR}/bin"
        mkdir -p "$CARGO_BIN_DIR"

        RUSTC_WRAPPER="${CARGO_BIN_DIR}/wrap-rustc"
        cat <<EOF >"$RUSTC_WRAPPER"
        #!/bin/sh
        exec mold -run "\$@"
        EOF
        chmod +x "$RUSTC_WRAPPER"

        # Now configure Cargo to use our rustc wrapper script.
        cat <<EOF >>"$CARGO_OVERRIDE_CONF"
        [build]
        rustc-wrapper = "$RUSTC_WRAPPER"
        EOF

    - name: Install protoc
      if: ${{ inputs.protoc == 'true' }}
      shell: bash
      run: |
        echo "Installing protoc"
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          sudo bash ./scripts/environment/install-protoc.sh /usr/local/bin
        else
          sudo bash ./scripts/environment/install-protoc.sh
        fi

    - name: Install cue
      if: ${{ inputs.cue == 'true' }}
      shell: bash
      run: |
        echo "Installing cue"
        TEMP=$(mktemp -d)
        curl \
          -L https://github.com/cue-lang/cue/releases/download/v0.16.1/cue_v0.16.1_linux_amd64.tar.gz \
          -o "${TEMP}/cue_v0.16.1_linux_amd64.tar.gz"
        tar \
          -xvf "${TEMP}/cue_v0.16.1_linux_amd64.tar.gz" \
          -C "${TEMP}"
        sudo cp "${TEMP}/cue" /usr/bin/cue
        rm -rf "$TEMP"

    - name: Install libsasl2
      if: ${{ inputs.libsasl2 == 'true' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libsasl2-dev

    - name: Cache cargo binaries
      id: cache-cargo-binaries
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: |
          ~/.cargo/bin/cargo-deb
          ~/.cargo/bin/cross
          ~/.cargo/bin/cargo-nextest
          ~/.cargo/bin/cargo-deny
          ~/.cargo/bin/cargo-msrv
          ~/.cargo/bin/cargo-hack
          ~/.cargo/bin/cargo-llvm-cov
          ~/.cargo/bin/dd-rust-license-tool
          ~/.cargo/bin/wasm-pack
          ~/.cargo/bin/vdev
        key: ${{ runner.os }}-cargo-binaries-${{ hashFiles('scripts/environment/*.sh') }}
        restore-keys: |
          ${{ runner.os }}-cargo-binaries-

    - name: Cache npm tools
      id: cache-npm-tools
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: scripts/environment/npm-tools/node_modules
        key: ${{ runner.os }}-npm-tools-${{ hashFiles('scripts/environment/npm-tools/*') }}

    - name: Run prepare.sh
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        mods=()
        [[ "${{ inputs.rust == 'true' || env.NEEDS_RUST == 'true' }}" == "true" ]] && mods+=("rustup")
        [[ "${{ inputs.cargo-deb }}" == "true" ]] && mods+=("cargo-deb")
        [[ "${{ inputs.cross }}" == "true" ]] && mods+=("cross")
        [[ "${{ inputs.cargo-nextest }}" == "true" ]] && mods+=("cargo-nextest")
        [[ "${{ inputs.cargo-deny }}" == "true" ]] && mods+=("cargo-deny")
        [[ "${{ inputs.cargo-msrv }}" == "true" ]] && mods+=("cargo-msrv")
        [[ "${{ inputs.cargo-hack }}" == "true" ]] && mods+=("cargo-hack")
        [[ "${{ inputs.cargo-llvm-cov }}" == "true" ]] && mods+=("cargo-llvm-cov")
        [[ "${{ inputs.dd-rust-license-tool }}" == "true" ]] && mods+=("dd-rust-license-tool")
        [[ "${{ inputs.wasm-pack }}" == "true" ]] && mods+=("wasm-pack")
        [[ "${{ inputs.vdev }}" == "true" ]] && mods+=("vdev")
        [[ "${{ inputs.markdownlint-cli2 }}" == "true" ]] && mods+=("markdownlint-cli2")
        [[ "${{ inputs.prettier }}" == "true" ]] && mods+=("prettier")
        [[ "${{ inputs.datadog-ci }}" == "true" ]] && mods+=("datadog-ci")
        csm=$(IFS=,; echo "${mods[*]}")

        if [[ "$csm" != "" ]]; then
          ./scripts/environment/prepare.sh --modules="${csm}"
        fi

        if [[ "$NEEDS_RUST" == "true" ]]; then
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        fi

    - name: Set VDEV environment variable
      if: ${{ inputs.vdev == 'true' }}
      shell: bash
      run: echo "VDEV=$(which vdev)" >> "$GITHUB_ENV"
