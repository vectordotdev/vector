# Executes various builds of vector to time the results in order to track compilation times.
#
# This workflow is unrelated to the Regression workflow.

name: Compilation Timings

on:
  workflow_dispatch:

env:
  CI: true

jobs:
  release-build-optimized:
    name: "Release Build (optimized)"
    runs-on: ubuntu-24.04-8core
    steps:
      - uses: colpal/actions-clean@36e6ca1abd35efe61cb60f912bd7837f67887c8a # v1.1.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh
      - run: bash scripts/environment/prepare.sh --modules=rustup
      - run: cargo clean
      - run: cargo build --release

  release-build-normal:
    name: "Release Build (normal)"
    runs-on: ubuntu-24.04-8core
    env:
      # Override the optimized release profile settings from Cargo.toml
      # (lto=fat, codegen-units=1) back to defaults for this timing comparison.
      CARGO_PROFILE_RELEASE_LTO: false
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
    steps:
      - uses: colpal/actions-clean@36e6ca1abd35efe61cb60f912bd7837f67887c8a # v1.1.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh
      - run: bash scripts/environment/prepare.sh --modules=rustup
      - run: cargo clean
      - run: cargo build --release

  debug-build:
    name: "Debug Build"
    runs-on: ubuntu-24.04-8core
    steps:
      - uses: colpal/actions-clean@36e6ca1abd35efe61cb60f912bd7837f67887c8a # v1.1.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh
      - run: bash scripts/environment/prepare.sh --modules=rustup
      - run: cargo clean
      - run: cargo build

  debug-rebuild:
    name: "Debug Rebuild"
    runs-on: ubuntu-24.04-8core
    steps:
      - uses: colpal/actions-clean@36e6ca1abd35efe61cb60f912bd7837f67887c8a # v1.1.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh
      - run: bash scripts/environment/prepare.sh --modules=rustup
      - run: cargo clean
      - run: cargo build
      - run: touch src/app.rs
      - run: cargo build

  check:
    name: "Cargo Check"
    runs-on: ubuntu-24.04-8core
    steps:
      - uses: colpal/actions-clean@36e6ca1abd35efe61cb60f912bd7837f67887c8a # v1.1.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh
      - run: bash scripts/environment/prepare.sh --modules=rustup
      - run: cargo clean
      - run: cargo check
