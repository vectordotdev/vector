name: Build and release component-probes binary

on:
  push:
    tags:
      - 'component-probes-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vector-component-probes-linux-x86_64.tar.gz
          - runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: vector-component-probes-linux-arm64.tar.gz
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          key: component-probes-${{ matrix.target }}

      - name: Bootstrap environment
        run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh

      - name: Install protoc
        run: sudo bash scripts/environment/install-protoc.sh

      - name: Build component-probes binary
        run: cargo build --release --features component-probes
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"

      - name: Package binary
        run: tar -czf ${{ matrix.artifact }} -C target/release vector

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
