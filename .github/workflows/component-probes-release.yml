name: Build and release component-probes binary

on:
  push:
    tags:
      - 'component-probes-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: false
        default: 'component-probes'
      tag:
        description: 'Release tag to create (e.g. component-probes-v0.49.3). Leave empty for no release.'
        required: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: vector-component-probes-linux-x86_64.tar.gz
          - runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: vector-component-probes-linux-arm64.tar.gz
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: component-probes-${{ matrix.target }}

      - name: Bootstrap environment
        run: sudo -E bash scripts/environment/bootstrap-ubuntu-24.04.sh

      - name: Install protoc
        run: sudo bash scripts/environment/install-protoc.sh

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Add musl Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build component-probes binary
        run: cargo build --release --features component-probes --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C force-frame-pointers=yes"
          CARGO_PROFILE_RELEASE_DEBUG: "true"

      - name: Package binary
        run: tar -czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release vector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload to GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (workflow_dispatch)
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.ref || 'component-probes' }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
