name: Remove Docs Review Label

on:
  workflow_run:
    workflows: ["Check Docs Review"]
    types:
      - completed

permissions:
  contents: read

env:
  LABEL_NAME: "docs review on hold"

jobs:
  remove_label:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download PR number
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-review-pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Remove label
        if: steps.download.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('pr-number', 'utf8').trim(), 10);
            if (isNaN(prNumber)) {
              core.setFailed('Invalid PR number');
              return;
            }

            const labelName = process.env.LABEL_NAME;
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: labelName,
            });
            core.info(`Removed "${labelName}" label from PR #${prNumber}`);
