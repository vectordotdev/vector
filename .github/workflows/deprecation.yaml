# Deprecation fragments
#
# Validates that all files in deprecation.d/ have the correct format.
# Runs on PRs and on merge queues.
name: Deprecation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "deprecation.d/**"

  # Required by GitHub merge queue due to branch protection rules. Should always be successful.
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  validate-deprecations:
    runs-on: ubuntu-24.04

    steps:
      - name: Merge queue
        if: ${{ github.event_name == 'merge_group' }}
        run: |
          echo "merge_group event – passing without running deprecation validation."
          exit 0

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install vdev
        run: cargo install --path vdev --locked

      - name: Validate deprecation fragments
        run: cargo vdev check deprecations
