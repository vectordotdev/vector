# Weekly Coverage
#
# Runs all test suites (unit, component validation, integration, e2e) with code coverage
# instrumentation on a single commit. Results are merged into one lcov report and uploaded
# to Datadog. Scheduled weekly so coverage reflects the full test suite without impacting
# regular CI latency.

name: Weekly Coverage

on:
  schedule:
    - cron: "0 2 * * 0"  # 2 AM UTC every Sunday
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CI: true

jobs:
  unit-coverage:
    uses: ./.github/workflows/unit-tests.yml
    with:
      coverage: true

  integration-tests:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/integration.yml
    with:
      coverage: true
    secrets: inherit

  coverage-upload:
    name: Merge and Upload Coverage
    runs-on: ubuntu-24.04
    needs:
      - unit-coverage
      - integration-tests
    # Run even if some integration jobs failed — partial coverage is still valuable.
    if: always() && needs.unit-coverage.result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all coverage artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: false

      - name: Merge coverage reports
        run: |
          sudo apt-get install -y --no-install-recommends lcov

          mapfile -t FILES < <(find coverage-artifacts -name '*.info')
          echo "Merging ${#FILES[@]} coverage file(s)"

          ARGS=()
          for f in "${FILES[@]}"; do
            ARGS+=("--add-tracefile" "$f")
          done
          lcov "${ARGS[@]}" --output-file merged-lcov.info

      - uses: ./.github/actions/setup
        with:
          vdev: false
          datadog-ci: true

      - name: Upload to Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: datadoghq.com
          DD_ENV: ci
        run: datadog-ci coverage upload merged-lcov.info
