name: Publish vdev
on:
  push:
    tags: ["vdev-v*.*.*"]

permissions:
  contents: read # Restrictive default

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to upload release assets
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout Vector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup
        with:
          rust: true
          vdev: false

      - name: Build
        working-directory: vdev
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#vdev-v}
          OUTDIR="vdev-${{ matrix.target }}-v${VERSION}"
          mkdir -p "$OUTDIR"

          BIN_ROOT="${CARGO_TARGET_DIR:-target}"
          BIN="${BIN_ROOT}/${{ matrix.target }}/release/vdev"
          if [[ ! -f "$BIN" ]]; then
              echo "Binary not found at: $BIN"
              find ${BIN_ROOT} -type -d
              exit 1
          fi

          cp "$BIN" "$OUTDIR/"
          tar -czf "${OUTDIR}.tgz" "$OUTDIR"
          echo "ASSET=${OUTDIR}.tgz" >> "$GITHUB_ENV"

      - name: Upload asset to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-24.04
    needs: build
    env:
      DISABLE_MOLD: true
    steps:
      - name: Checkout Vector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup
        with:
          rust: true
          vdev: false
          mold: false

      - name: Publish to crates.io
        working-directory: vdev
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
