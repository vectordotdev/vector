name: Custom Builds

permissions:
  contents: read # Restrictive default

on:
  workflow_dispatch: {}

jobs:
  Custom:
    permissions:
      contents: write # Required to create/update releases and tags
      packages: write # Required to push container images to GHCR
    uses: ./.github/workflows/publish.yml
    with:
      git_ref: ${{ github.ref }}
      channel: custom
    secrets: inherit
