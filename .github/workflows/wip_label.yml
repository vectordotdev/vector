name: Work In Progress Label

permissions:
  pull-requests: write

on:
  pull_request_target:
    types: [opened, reopened]
    # Keep these paths in sync with the documentation team entries in .github/CODEOWNERS
    paths:
      - "docs/**"
      - "website/content/**"
      - "website/cue/reference/**"

  pull_request_review:
    types: [submitted]

jobs:
  add_wip_label:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        with:
          labels: "work in progress"

  remove_wip_label:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      (github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'OWNER') &&
      contains(github.event.pull_request.labels.*.name, 'work in progress')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0 # v1.3.0
        with:
          labels: "work in progress"
          fail_on_error: true
