version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - /dd_start_script.sh
            - source ~/.nvm/nvm.sh
            - nvm use $VERSION_NODE_20
            - echo "Installing Make..."
            - apt-get update
            - apt-get install -y make
            - make -v
            - echo "Installing Cuelang..."
            - curl -LO "https://github.com/cue-lang/cue/releases/download/v0.6.0/cue_v0.6.0_linux_amd64.tar.gz"
            - mkdir tmp_cue_install
            - tar xzf cue_v0.6.0_linux_amd64.tar.gz -C tmp_cue_install
            - mv tmp_cue_install/cue /usr/local/bin/
            - rm -rf tmp_cue_install
            - cue version
            - echo "Installing htmltest..."
            - curl -LO "https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz"
            - tar xzf htmltest_0.17.0_linux_amd64.tar.gz
            - mv htmltest /usr/local/bin/
            - htmltest --version
            - echo "Installing Hugo v${HUGO_VERSION}..."
            - curl -LO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz"
            - tar xzf hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
            - mv hugo /usr/local/bin/
            - hugo version
            - echo "Installing Rust..."
            - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            - source ~/.cargo/env
            - echo "Installing protoc..."
            - apt-get install -y protobuf-compiler
            - echo "Building vdev..."
            - cd .. && cargo build -p vdev --release
            - cp ../target/release/vdev /usr/local/bin/
            - vdev version
            - export VDEV=vdev
        build:
          commands:
            - export VDEV=vdev
            - DEPLOY_PRIME_URL=$(echo "https://$(echo "${AWS_BRANCH}" | sed 's/[./]/-/g').d1a7j77663uxsc.amplifyapp.com" )
            - if [[ "${AWS_BRANCH}" == "website" ]]; then DEPLOY_COMMAND="ci-production-build"; fi
            - make $DEPLOY_COMMAND | tee -a /var/log/amplify-build.log
        postBuild:
          commands:
            - datadog-agent stop
      artifacts:
        baseDirectory: public
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: website
