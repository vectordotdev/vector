data_dir: /tmp/vector-native-sender
api:
  enabled: true
  address: 0.0.0.0:8686
  playground: false
sources:
  stdin:
    type: stdin
transforms:
  parse_json:
    type: remap
    inputs:
      - stdin
    source: |
      m, e = parse_json(.message)
      if e == null {
        .message = m
      }
sinks:
  # Uses the native codec implicitly (prost protobuf over gRPC).
  # Same as the daemonset's "aggregator" sink in production.
  sender:
    type: vector
    inputs:
      - parse_json
    address: 127.0.0.1:6001
